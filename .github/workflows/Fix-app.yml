name: Build Ubuntu Bionic RootFS

on:
  workflow_dispatch:
  push:
    tags:
      - "bionic-*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          qemu-user-static \
          debootstrap \
          binfmt-support \
          xz-utils \
          tar

    - name: Make script executable
      run: chmod +x scripts/build-rootfs-bionic.sh

    - name: Build bionic rootfs
      run: sudo ./scripts/build-rootfs-bionic.sh

    - name: Upload as release asset
      #if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: imagefs_bionic.txz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
